name: main pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"

  docker:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: capstone-app
      tag: latest
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    needs: docker
    runs-on: self-hosted
    env:
      IMAGE_URL: ${{ secrets.DOCKER_USERNAME }}/capstone-app:latest
      CONTAINER_NAME: capstone-app
      HOST_PORT: 5000
    steps:
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull image
        run: |
          docker pull "$IMAGE_URL"

      - name: Stop existing container
        run: |
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true

      - name: Start container
        run: |
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p ${HOST_PORT}:5000 \
            "$IMAGE_URL"

      - name: Verify deployment
        run: |
          for attempt in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${HOST_PORT}/health" || true)
            echo "Attempt ${attempt}: HTTP Status ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 3
          done

          docker logs "$CONTAINER_NAME" || true
          exit 1
