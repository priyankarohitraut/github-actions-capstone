name: PR Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"
      run_tests: true

  pr-comment:
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ needs.build-test.result == 'success' }}

    steps:
      - name: Print PR summary
        run: |
          echo "PR checks passed for branch: ${{ github.head_ref }}"
          echo "Reusable test result: ${{ needs.build-test.outputs.test_result }}"
